<!DOCTYPE html>
<html>
<head>
    <title>UMT Portal Login</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: url('images/umt.jpeg') no-repeat center center/cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.4);
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .login-box {
            position: relative;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            width: 320px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            z-index: 1;
        }

        .login-box img {
            width: 90px;
            margin-bottom: 10px;
        }

        h3 {
            margin: 10px 0 20px;
            color: #333;
        }

        input[type="text"],
        input[type="password"] {
            width: 90%;
            padding: 8px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        .check {
            font-size: 13px;
            text-align: left;
            margin-left: 5%;
        }

        .btn {
            width: 95%;
            padding: 10px;
            background: #0077b6;
            color: white;
            border: none;
            border-radius: 6px;
            margin-top: 10px;
            cursor: pointer;
        }

        .btn:hover {
            background: #023e8a;
        }

        a {
            display: block;
            margin-top: 10px;
            font-size: 13px;
            color: #444;
        }
    </style>
</head>

<body>

<div class="overlay"></div>

<div class="login-box">
    <img src="images/umtlogo.jpeg" alt="logo">

    <h3>Sign in to your account</h3>

    <form>
        <input type="text" placeholder="Username"><br>
        <input type="password" placeholder="Password">

        <div class="check">
            <input type="checkbox"> Remember me
        </div>

        <input type="submit" value="Login" class="btn">
    </form>

    <a href="#">Forgot your password?</a>
</div>

</body>
</html>
